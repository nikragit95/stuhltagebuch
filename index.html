<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Darmtagebuch" />
  <meta name="theme-color" content="#0f0f1a" />
  <link rel="manifest" href="manifest.json" />
  <title>Darmtagebuch</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0f0f1a;
      --surface: #1a1a2e;
      --surface2: #22223b;
      --border: rgba(255,255,255,0.08);
      --accent: #7c9ef5;
      --accent2: #a8edbe;
      --text: #f0f0f5;
      --text-muted: rgba(240,240,245,0.45);
      --danger: #f28b82;
      --radius: 16px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      overflow: hidden;
    }

    /* ── SHELL ── */
    #app {
      display: flex;
      flex-direction: column;
      height: 100dvh;
      height: -webkit-fill-available;
    }

    /* ── TOP BAR ── */
    #topbar {
      flex-shrink: 0;
      background: rgba(15,15,26,0.95);
      border-bottom: 1px solid var(--border);
      padding: env(safe-area-inset-top, 0px) 20px 0;
      display: flex; align-items: center; justify-content: space-between;
      height: calc(env(safe-area-inset-top, 0px) + 56px);
    }
    #topbar h1 {
      font-family: 'DM Serif Display', serif;
      font-size: 20px; font-weight: 400;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    #syncBtn {
      background: rgba(124,158,245,0.12);
      border: 1px solid rgba(124,158,245,0.3);
      color: var(--accent);
      padding: 6px 14px; border-radius: 50px;
      font-family: 'DM Sans', sans-serif;
      font-size: 13px; font-weight: 500;
      cursor: pointer;
    }

    /* ── SCROLL AREA ── */
    #content {
      flex: 1;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }

    /* ── PAGES ── */
    .page { display: none; padding: 16px 16px calc(16px); }
    .page.active { display: block; }

    /* ── BOTTOM TABS ── */
    #tabs {
      flex-shrink: 0;
      background: rgba(15,15,26,0.95);
      border-top: 1px solid var(--border);
      display: flex;
      padding-bottom: env(safe-area-inset-bottom, 0px);
    }
    .tab-btn {
      flex: 1; background: none; border: none;
      color: var(--text-muted);
      padding: 10px 0 8px;
      display: flex; flex-direction: column; align-items: center; gap: 3px;
      font-family: 'DM Sans', sans-serif; font-size: 10px; font-weight: 500;
      letter-spacing: 0.5px; text-transform: uppercase;
      cursor: pointer; transition: color .15s;
    }
    .tab-btn svg { width: 22px; height: 22px; }
    .tab-btn.active { color: var(--accent); }

    /* ── CARDS ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 18px;
      margin-bottom: 12px;
    }
    .card-title {
      font-size: 12px; font-weight: 500; text-transform: uppercase;
      letter-spacing: 0.8px; color: var(--text-muted);
      margin-bottom: 14px;
    }

    /* Datetime */
    .datetime-row { display: flex; gap: 10px; }
    .datetime-row input {
      flex: 1; background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px; color: var(--text);
      padding: 11px 12px; font-family: 'DM Sans', sans-serif;
      font-size: 15px; outline: none; -webkit-appearance: none;
      color-scheme: dark;
    }

    /* Konsistenz */
    .bristol-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
    .bristol-btn {
      background: var(--surface2); border: 2px solid var(--border);
      border-radius: 10px; color: var(--text-muted);
      padding: 8px 2px; cursor: pointer;
      display: flex; flex-direction: column; align-items: center; gap: 2px;
      transition: all .15s;
    }
    .bristol-btn .num { font-size: 13px; font-weight: 600; color: var(--text-muted); line-height: 1; }
    .bristol-btn .shape { font-size: 22px; line-height: 1; }
    .bristol-btn .label { font-size: 11px; font-weight: 500; text-align: center; line-height: 1.2; color: var(--text); }
    .bristol-btn.selected { border-color: var(--accent); background: rgba(124,158,245,0.15); }
    .bristol-btn.selected .num { color: var(--accent); }

    /* Colors */
    .color-row { display: flex; gap: 12px; flex-wrap: wrap; padding: 4px 0 16px; }
    .color-wrap { display: flex; flex-direction: column; align-items: center; gap: 6px; }
    .color-chip {
      width: 38px; height: 38px; border-radius: 50%;
      border: 3px solid transparent; cursor: pointer;
      transition: transform .15s, border-color .15s;
    }
    .color-chip.selected { border-color: white; transform: scale(1.2); }
    .color-label { font-size: 9px; color: var(--text-muted); }

    /* Blood toggle */
    .toggle-row { display: flex; gap: 10px; }
    .toggle-btn {
      flex: 1; background: var(--surface2); border: 2px solid var(--border);
      border-radius: 12px; color: var(--text-muted);
      padding: 14px 8px; cursor: pointer; font-family: 'DM Sans', sans-serif;
      font-size: 15px; font-weight: 500; transition: all .15s;
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .toggle-btn.selected-no  { border-color: var(--accent2); background: rgba(168,237,190,0.12); color: var(--accent2); }
    .toggle-btn.selected-yes { border-color: var(--danger);  background: rgba(242,139,130,0.12); color: var(--danger); }


    .pain-row { display: flex; align-items: center; gap: 12px; }
    .pain-row input[type=range] {
      flex: 1; -webkit-appearance: none; height: 6px;
      background: linear-gradient(90deg, var(--accent2), var(--danger));
      border-radius: 3px; outline: none;
    }
    .pain-row input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none; width: 24px; height: 24px;
      background: white; border-radius: 50%; box-shadow: 0 2px 8px rgba(0,0,0,0.4);
    }
    .pain-val { width: 30px; text-align: center; font-size: 18px; font-weight: 700; }

    /* Notes */
    textarea {
      width: 100%; background: var(--surface2);
      border: 1px solid var(--border); border-radius: 10px;
      color: var(--text); padding: 12px;
      font-family: 'DM Sans', sans-serif; font-size: 15px;
      outline: none; resize: none; line-height: 1.5;
    }

    /* Submit */
    .submit-btn {
      width: 100%; background: linear-gradient(135deg, #7c9ef5, #5b7de8);
      border: none; border-radius: 14px; color: white;
      padding: 16px; font-family: 'DM Sans', sans-serif;
      font-size: 16px; font-weight: 600; cursor: pointer; margin-top: 4px;
      transition: opacity .2s;
    }
    .submit-btn:active { opacity: 0.85; }

    /* ── HISTORY ── */
    .history-entry {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 14px 16px;
      margin-bottom: 10px; display: flex; align-items: flex-start; gap: 12px;
    }
    .entry-dot { width: 12px; height: 12px; border-radius: 50%; margin-top: 4px; flex-shrink: 0; }
    .entry-body { flex: 1; min-width: 0; }
    .entry-date { font-size: 12px; color: var(--text-muted); margin-bottom: 3px; }
    .entry-main { font-size: 15px; font-weight: 500; }
    .entry-note { font-size: 12px; color: var(--text-muted); margin-top: 4px; }
    .entry-tags { display: flex; gap: 5px; flex-wrap: wrap; margin-top: 6px; }
    .tag { background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; padding: 2px 8px; font-size: 11px; color: var(--text-muted); }
    .entry-delete { background: none; border: none; color: var(--text-muted); font-size: 20px; cursor: pointer; padding: 0; line-height: 1; flex-shrink: 0; }
    .empty-state { text-align: center; padding: 60px 20px; color: var(--text-muted); font-size: 15px; line-height: 1.8; }
    .empty-icon { font-size: 44px; margin-bottom: 10px; }

    /* ── SETTINGS ── */
    .s-label { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: var(--text-muted); margin: 20px 0 8px; }
    .s-label:first-child { margin-top: 0; }
    .s-input {
      width: 100%; background: var(--surface2);
      border: 1px solid var(--border); border-radius: 10px;
      color: var(--text); padding: 13px 14px;
      font-family: 'DM Sans', sans-serif; font-size: 14px; outline: none;
    }
    .s-hint { font-size: 12px; color: var(--text-muted); margin-top: 6px; line-height: 1.5; }
    .s-save {
      width: 100%; background: var(--surface2);
      border: 1px solid rgba(124,158,245,0.3); border-radius: 12px;
      color: var(--accent); padding: 14px;
      font-family: 'DM Sans', sans-serif; font-size: 15px; font-weight: 500;
      cursor: pointer; margin-top: 16px;
    }
    .s-save:active { background: rgba(124,158,245,0.1); }
    .s-status { margin-top: 12px; font-size: 13px; color: var(--accent2); min-height: 20px; }
    .queue-box {
      background: rgba(124,158,245,0.07); border: 1px solid rgba(124,158,245,0.15);
      border-radius: 12px; padding: 14px; font-size: 13px; color: var(--accent);
      margin-top: 14px; line-height: 1.7;
    }

    /* Toast */
    .toast {
      position: fixed; bottom: calc(env(safe-area-inset-bottom, 0px) + 80px);
      left: 50%; transform: translateX(-50%) translateY(10px);
      background: #2a2a3e; border: 1px solid var(--border);
      border-radius: 10px; padding: 11px 20px;
      font-size: 14px; font-weight: 500;
      opacity: 0; transition: all .25s; z-index: 999; white-space: nowrap;
      pointer-events: none;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    .toast.success { border-color: rgba(168,237,190,0.4); color: var(--accent2); }
    .toast.fail { border-color: rgba(242,139,130,0.4); color: var(--danger); }
  </style>
</head>
<body>
<div id="app">

  <!-- TOP BAR -->
  <div id="topbar">
    <h1>🌿 Darmtagebuch</h1>
    <button id="syncBtn" onclick="syncAll()">↑ Sync</button>
  </div>

  <!-- SCROLLABLE CONTENT -->
  <div id="content">

    <!-- NEU -->
    <div id="page-new" class="page active">
      <div class="card">
        <div class="card-title">Datum & Uhrzeit</div>
        <div class="datetime-row">
          <input type="date" id="entryDate" />
          <input type="time" id="entryTime" />
        </div>
      </div>

      <div class="card">
        <div class="card-title">Konsistenz</div>
        <div class="bristol-grid" id="bristolGrid"></div>
      </div>

      <div class="card">
        <div class="card-title">Farbe</div>
        <div class="color-row" id="colorGrid"></div>
      </div>

      <div class="card">
        <div class="card-title">Blut</div>
        <div class="toggle-row">
          <button class="toggle-btn" id="bloodNo"  onclick="setBlood(false)">✓ &nbsp;Kein Blut</button>
          <button class="toggle-btn" id="bloodYes" onclick="setBlood(true)">🩸 &nbsp;Blut</button>
        </div>
      </div>

      <div class="card"> &amp; Beschwerden &nbsp;<span style="font-weight:300;text-transform:none;letter-spacing:0">(0 = keine)</span></div>
        <div class="pain-row">
          <input type="range" id="painSlider" min="0" max="10" value="0"
            oninput="document.getElementById('painVal').textContent=this.value" />
          <span class="pain-val" id="painVal">0</span>
        </div>
      </div>

      <div class="card">
        <div class="card-title">Notizen</div>
        <textarea id="notesField" placeholder="Optionale Bemerkungen…" rows="3"></textarea>
      </div>

      <button class="submit-btn" onclick="saveEntry()">Eintrag speichern</button>
      <div style="height:8px"></div>
    </div>

    <!-- VERLAUF -->
    <div id="page-history" class="page">
      <div id="historyList"></div>
    </div>

    <!-- EINSTELLUNGEN -->
    <div id="page-settings" class="page">
      <div class="s-label">Google Apps Script URL</div>
      <input class="s-input" type="url" id="scriptUrl"
        placeholder="https://script.google.com/macros/s/…/exec" />
      <div class="s-hint">Die Web-App-URL aus Google Apps Script (Schritt 3 der Anleitung)</div>

      <button class="s-save" onclick="saveSettings()">✓ Einstellungen speichern</button>
      <div class="s-status" id="settingsStatus"></div>
      <div class="queue-box" id="queueInfo"></div>
    </div>

  </div><!-- /content -->

  <!-- BOTTOM TABS -->
  <div id="tabs">
    <button class="tab-btn active" id="tab-new" onclick="showTab('new')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
      Neu
    </button>
    <button class="tab-btn" id="tab-history" onclick="showTab('history')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 8v4l3 3"/><circle cx="12" cy="12" r="9"/></svg>
      Verlauf
    </button>
    <button class="tab-btn" id="tab-settings" onclick="showTab('settings')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
      Einstellungen
    </button>
  </div>

</div><!-- /app -->

<div class="toast" id="toast"></div>

<script>
const BRISTOL = [
  {num:1, shape:'🪨', label:'Hart'},
  {num:2, shape:'🌰', label:'Geformt'},
  {num:3, shape:'💧', label:'Breiig'},
  {num:4, shape:'🌊', label:'Flüssig'},
];
const COLORS = [
  {id:'braun',    hex:'#7B4D2A', label:'Braun'},
  {id:'hellbraun',hex:'#C8843A', label:'Hell'},
  {id:'dunkel',   hex:'#3D1F0A', label:'Dunkel'},
  {id:'gelb',     hex:'#D4B44A', label:'Gelb'},
  {id:'gruen',    hex:'#5A8A3C', label:'Grün'},
  {id:'rot',      hex:'#B83232', label:'Rot'},
  {id:'schwarz',  hex:'#2a2a2a', label:'Schwarz'},
];

let selectedBristol = null;
let selectedColor = null;
let selectedBlood = null;

function getNextId() {
  const n = parseInt(localStorage.getItem('nextId') || '1');
  localStorage.setItem('nextId', n + 1);
  return n;
}

function setBlood(val) {
  selectedBlood = val;
  document.getElementById('bloodNo').className  = 'toggle-btn' + (val === false ? ' selected-no'  : '');
  document.getElementById('bloodYes').className = 'toggle-btn' + (val === true  ? ' selected-yes' : '');
}

function init() {
  const now = new Date();
  document.getElementById('entryDate').value = now.toISOString().slice(0,10);
  document.getElementById('entryTime').value = now.toTimeString().slice(0,5);

  // Bristol
  const grid = document.getElementById('bristolGrid');
  BRISTOL.forEach(b => {
    const btn = document.createElement('button');
    btn.className = 'bristol-btn';
    btn.innerHTML = `<span class="num">${b.num}</span><span class="shape">${b.shape}</span><span class="label">${b.label}</span>`;
    btn.onclick = () => {
      document.querySelectorAll('.bristol-btn').forEach(x => x.classList.remove('selected'));
      btn.classList.add('selected');
      selectedBristol = b.num;
    };
    grid.appendChild(btn);
  });

  // Colors
  const cg = document.getElementById('colorGrid');
  COLORS.forEach(c => {
    const wrap = document.createElement('div');
    wrap.className = 'color-wrap';
    const chip = document.createElement('div');
    chip.className = 'color-chip';
    chip.style.background = c.hex;
    chip.onclick = () => {
      document.querySelectorAll('.color-chip').forEach(x => x.classList.remove('selected'));
      chip.classList.add('selected');
      selectedColor = c.id;
    };
    const lbl = document.createElement('span');
    lbl.className = 'color-label';
    lbl.textContent = c.label;
    wrap.appendChild(chip);
    wrap.appendChild(lbl);
    cg.appendChild(wrap);
  });

  document.getElementById('scriptUrl').value = localStorage.getItem('scriptUrl') || '';
  updateQueueInfo();
}

function showTab(name) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('page-' + name).classList.add('active');
  document.getElementById('tab-' + name).classList.add('active');
  document.getElementById('content').scrollTop = 0;
  if (name === 'history') renderHistory();
  if (name === 'settings') updateQueueInfo();
}

function saveEntry() {
  const date = document.getElementById('entryDate').value;
  const time = document.getElementById('entryTime').value;
  if (!date || !time) { toast('Bitte Datum und Uhrzeit eingeben', 'fail'); return; }

  const entry = {
    id: Date.now(),
    pid: getNextId(),
    datetime: `${date}T${time}`,
    bristol: selectedBristol,
    farbe: selectedColor,
    blut: selectedBlood,
    schmerzen: parseInt(document.getElementById('painSlider').value),
    notizen: document.getElementById('notesField').value.trim(),
    synced: false
  };

  const entries = getEntries();
  entries.unshift(entry);
  localStorage.setItem('entries', JSON.stringify(entries));
  toast('Eintrag gespeichert ✓', 'success');
  resetForm();
  updateQueueInfo();
  syncAll();
}

function resetForm() {
  const now = new Date();
  document.getElementById('entryDate').value = now.toISOString().slice(0,10);
  document.getElementById('entryTime').value = now.toTimeString().slice(0,5);
  document.querySelectorAll('.bristol-btn').forEach(x => x.classList.remove('selected'));
  document.querySelectorAll('.color-chip').forEach(x => x.classList.remove('selected'));
  document.getElementById('painSlider').value = 0;
  document.getElementById('painVal').textContent = '0';
  document.getElementById('notesField').value = '';
  selectedBristol = null; selectedColor = null; selectedBlood = null;
  document.getElementById('bloodNo').className = 'toggle-btn';
  document.getElementById('bloodYes').className = 'toggle-btn';
}

function getEntries() {
  return JSON.parse(localStorage.getItem('entries') || '[]');
}

function renderHistory() {
  const list = document.getElementById('historyList');
  const entries = getEntries();
  if (!entries.length) {
    list.innerHTML = `<div class="empty-state"><div class="empty-icon">📋</div>Noch keine Einträge.<br>Füge deinen ersten Eintrag hinzu!</div>`;
    return;
  }
  list.innerHTML = entries.map(e => {
    const cd = COLORS.find(c => c.id === e.farbe);
    const dot = cd ? cd.hex : '#555';
    const dt = new Date(e.datetime);
    const dateStr = dt.toLocaleDateString('de-DE', {weekday:'short',day:'2-digit',month:'2-digit',year:'numeric'});
    const timeStr = dt.toLocaleTimeString('de-DE', {hour:'2-digit',minute:'2-digit'});
    const bi = e.bristol ? BRISTOL.find(b => b.num === e.bristol) : null;
    const tags = [];
    if (bi) tags.push(`${bi.shape} ${bi.label}`);
    if (cd) tags.push(cd.label);
    if (e.schmerzen > 0) tags.push(`Schmerz ${e.schmerzen}/10`);
    if (e.blut === true)  tags.push(`🩸 Blut`);
    if (e.blut === false) tags.push(`✓ Kein Blut`);
    const syncMark = e.synced ? '☁️' : '⏳';
    const pidStr = e.pid ? `#${e.pid} · ` : '';
    return `<div class="history-entry">
      <div class="entry-dot" style="background:${dot}"></div>
      <div class="entry-body">
        <div class="entry-date">${pidStr}${dateStr} · ${timeStr} ${syncMark}</div>
        <div class="entry-main">${bi ? bi.label : 'Keine Konsistenz'}</div>
        ${e.notizen ? `<div class="entry-note">${e.notizen}</div>` : ''}
        <div class="entry-tags">${tags.map(t=>`<span class="tag">${t}</span>`).join('')}</div>
      </div>
      <button class="entry-delete" onclick="deleteEntry(${e.id})">×</button>
    </div>`;
  }).join('');
}

function deleteEntry(id) {
  localStorage.setItem('entries', JSON.stringify(getEntries().filter(e => e.id !== id)));
  renderHistory();
  updateQueueInfo();
}

async function syncAll() {
  const url = localStorage.getItem('scriptUrl');
  if (!url) return;
  const entries = getEntries();
  const unsynced = entries.filter(e => !e.synced);
  if (!unsynced.length) return;
  document.getElementById('syncBtn').textContent = '↻…';
  let ok = 0;
  for (const entry of unsynced) {
    try {
      const cd = COLORS.find(c => c.id === entry.farbe);
      const bi = entry.bristol ? BRISTOL.find(b => b.num === entry.bristol) : null;
      await fetch(url, {
        method: 'POST',
        mode: 'no-cors',
        redirect: 'follow',
        headers: { 'Content-Type': 'text/plain' },
        body: JSON.stringify({
          pid: entry.pid || '',
          datum: entry.datetime.slice(0,10),
          uhrzeit: entry.datetime.slice(11,16),
          konsistenz: bi?.label || '',
          farbe: cd?.label || '',
          blut: entry.blut === true ? 'Ja' : entry.blut === false ? 'Nein' : '',
          schmerzen: entry.schmerzen,
          notizen: entry.notizen
        })
      });
      entry.synced = true; ok++;
    } catch(e) {}
  }
  localStorage.setItem('entries', JSON.stringify(entries));
  document.getElementById('syncBtn').textContent = '↑ Sync';
  updateQueueInfo();
  if (ok > 0) { toast(`${ok} Eintrag/Einträge synchronisiert ☁️`, 'success'); renderHistory(); }
}

function updateQueueInfo() {
  const entries = getEntries();
  const pending = entries.filter(e => !e.synced).length;
  const synced = entries.filter(e => e.synced).length;
  const box = document.getElementById('queueInfo');
  if (!box) return;
  box.innerHTML = pending > 0
    ? `⏳ ${pending} Eintrag/Einträge warten auf Sync<br>☁️ ${synced} bereits synchronisiert`
    : synced > 0 ? `☁️ Alle ${synced} Einträge synchronisiert` : 'Noch keine Einträge vorhanden.';
}

function saveSettings() {
  localStorage.setItem('scriptUrl', document.getElementById('scriptUrl').value.trim());
  document.getElementById('settingsStatus').textContent = '✓ Gespeichert';
  setTimeout(() => document.getElementById('settingsStatus').textContent = '', 2500);
  updateQueueInfo();
}

function toast(msg, type='success') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = `toast ${type} show`;
  setTimeout(() => t.className = 'toast', 2800);
}

if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(()=>{});

init();
</script>
</body>
</html>
