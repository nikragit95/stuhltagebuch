<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Darmtagebuch" />
  <meta name="theme-color" content="#1a1a2e" />
  <link rel="manifest" href="manifest.json" />
  <title>Darmtagebuch</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0f0f1a;
      --surface: #1a1a2e;
      --surface2: #22223b;
      --border: rgba(255,255,255,0.08);
      --accent: #7c9ef5;
      --accent2: #a8edbe;
      --text: #f0f0f5;
      --text-muted: rgba(240,240,245,0.45);
      --danger: #f28b82;
      --success: #a8edbe;
      --radius: 18px;
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-weight: 400;
      min-height: 100dvh;
      overflow-x: hidden;
    }

    /* ── NAV ── */
    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      background: rgba(15,15,26,0.85);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      padding: calc(var(--safe-top) + 14px) 20px 14px;
      display: flex; align-items: center; justify-content: space-between;
      border-bottom: 1px solid var(--border);
    }
    nav h1 {
      font-family: 'DM Serif Display', serif;
      font-size: 22px; font-weight: 400;
      letter-spacing: -0.3px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    nav .sync-btn {
      background: rgba(124,158,245,0.12);
      border: 1px solid rgba(124,158,245,0.25);
      color: var(--accent);
      padding: 7px 14px; border-radius: 50px;
      font-family: 'DM Sans', sans-serif;
      font-size: 13px; font-weight: 500;
      cursor: pointer; transition: all .2s;
    }
    nav .sync-btn:active { transform: scale(0.95); }

    /* ── TABS ── */
    .tabs {
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 100;
      background: rgba(15,15,26,0.92);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-top: 1px solid var(--border);
      display: flex;
      padding-bottom: var(--safe-bottom);
    }
    .tab-btn {
      flex: 1; background: none; border: none;
      color: var(--text-muted);
      padding: 12px 0; cursor: pointer;
      display: flex; flex-direction: column; align-items: center; gap: 4px;
      font-family: 'DM Sans', sans-serif; font-size: 10px; font-weight: 500;
      letter-spacing: 0.5px; text-transform: uppercase;
      transition: color .2s;
    }
    .tab-btn svg { width: 22px; height: 22px; }
    .tab-btn.active { color: var(--accent); }

    /* ── PAGES ── */
    .page {
      display: none;
      padding: calc(var(--safe-top) + 72px) 16px calc(var(--safe-bottom) + 84px);
      min-height: 100dvh;
    }
    .page.active { display: block; }

    /* ── ENTRY FORM ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      margin-bottom: 14px;
    }
    .card-title {
      font-family: 'DM Serif Display', serif;
      font-size: 15px; font-weight: 400;
      color: var(--text-muted);
      margin-bottom: 14px;
      letter-spacing: 0.2px;
    }

    /* Datetime */
    .datetime-row { display: flex; gap: 10px; }
    .datetime-row input {
      flex: 1; background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 12px; color: var(--text);
      padding: 12px 14px; font-family: 'DM Sans', sans-serif;
      font-size: 15px; outline: none;
      -webkit-appearance: none;
      color-scheme: dark;
    }

    /* Bristol Scale */
    .bristol-grid {
      display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px;
    }
    .bristol-btn {
      background: var(--surface2); border: 2px solid var(--border);
      border-radius: 12px; color: var(--text-muted);
      padding: 10px 4px; cursor: pointer;
      display: flex; flex-direction: column; align-items: center; gap: 3px;
      transition: all .15s;
    }
    .bristol-btn .num {
      font-size: 18px; font-weight: 600; line-height: 1;
      color: var(--text);
    }
    .bristol-btn .shape { font-size: 18px; line-height: 1; }
    .bristol-btn .label { font-size: 8px; text-align: center; line-height: 1.2; }
    .bristol-btn.selected {
      border-color: var(--accent);
      background: rgba(124,158,245,0.15);
      color: var(--accent);
    }
    .bristol-btn.selected .num { color: var(--accent); }

    /* Color picker */
    .color-grid {
      display: flex; gap: 10px; flex-wrap: wrap;
    }
    .color-chip {
      width: 40px; height: 40px; border-radius: 50%;
      border: 3px solid transparent;
      cursor: pointer; transition: transform .15s, border-color .15s;
      position: relative;
    }
    .color-chip.selected {
      border-color: white; transform: scale(1.15);
    }
    .color-chip::after {
      content: attr(data-label);
      position: absolute; bottom: -18px; left: 50%; transform: translateX(-50%);
      font-size: 9px; color: var(--text-muted); white-space: nowrap;
    }
    .color-wrap { position: relative; margin-bottom: 8px; }

    /* Pain slider */
    .pain-row { display: flex; align-items: center; gap: 12px; }
    .pain-row input[type=range] {
      flex: 1; -webkit-appearance: none; height: 6px;
      background: linear-gradient(90deg, var(--accent2), var(--danger));
      border-radius: 3px; outline: none;
    }
    .pain-row input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none; width: 22px; height: 22px;
      background: white; border-radius: 50%;
      box-shadow: 0 2px 8px rgba(0,0,0,0.4);
    }
    .pain-val {
      width: 32px; text-align: center;
      font-size: 18px; font-weight: 600;
    }

    /* Notes */
    textarea {
      width: 100%; background: var(--surface2);
      border: 1px solid var(--border); border-radius: 12px;
      color: var(--text); padding: 12px 14px;
      font-family: 'DM Sans', sans-serif; font-size: 15px;
      outline: none; resize: none; min-height: 80px;
      line-height: 1.5;
    }

    /* Submit */
    .submit-btn {
      width: 100%; background: linear-gradient(135deg, var(--accent), #5b7de8);
      border: none; border-radius: 14px; color: white;
      padding: 16px; font-family: 'DM Sans', sans-serif;
      font-size: 16px; font-weight: 600; cursor: pointer;
      letter-spacing: 0.2px; transition: opacity .2s, transform .1s;
      margin-top: 6px;
    }
    .submit-btn:active { transform: scale(0.98); opacity: 0.9; }

    /* ── HISTORY ── */
    .history-entry {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 16px 18px;
      margin-bottom: 10px; display: flex; align-items: flex-start; gap: 14px;
      animation: fadeUp .3s ease;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .entry-dot {
      width: 14px; height: 14px; border-radius: 50%;
      margin-top: 3px; flex-shrink: 0;
    }
    .entry-body { flex: 1; }
    .entry-date { font-size: 12px; color: var(--text-muted); margin-bottom: 4px; }
    .entry-main { font-size: 15px; font-weight: 500; margin-bottom: 4px; }
    .entry-tags { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 6px; }
    .tag {
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 6px; padding: 3px 8px; font-size: 11px; color: var(--text-muted);
    }
    .entry-delete {
      background: none; border: none; color: var(--text-muted);
      font-size: 18px; cursor: pointer; padding: 0 4px; line-height: 1;
    }
    .empty-state {
      text-align: center; padding: 60px 20px;
      color: var(--text-muted); font-size: 15px; line-height: 1.7;
    }
    .empty-state .icon { font-size: 48px; margin-bottom: 12px; }

    /* ── SETTINGS ── */
    .settings-label {
      font-size: 11px; text-transform: uppercase; letter-spacing: 1px;
      color: var(--text-muted); margin: 20px 0 8px; padding: 0 4px;
    }
    .settings-input {
      width: 100%; background: var(--surface2);
      border: 1px solid var(--border); border-radius: 12px;
      color: var(--text); padding: 13px 14px;
      font-family: 'DM Sans', sans-serif; font-size: 14px;
      outline: none; margin-bottom: 4px;
    }
    .settings-hint {
      font-size: 12px; color: var(--text-muted); padding: 0 4px; margin-bottom: 4px;
      line-height: 1.5;
    }
    .settings-save {
      width: 100%; background: var(--surface2);
      border: 1px solid rgba(124,158,245,0.3); border-radius: 12px;
      color: var(--accent); padding: 13px;
      font-family: 'DM Sans', sans-serif; font-size: 15px; font-weight: 500;
      cursor: pointer; margin-top: 8px; transition: background .2s;
    }
    .settings-save:active { background: rgba(124,158,245,0.1); }

    .status-badge {
      display: inline-flex; align-items: center; gap: 6px;
      background: rgba(168,237,190,0.1); border: 1px solid rgba(168,237,190,0.25);
      border-radius: 8px; padding: 8px 12px;
      font-size: 13px; color: var(--accent2); margin-top: 10px;
    }
    .status-badge.error { background: rgba(242,139,130,0.1); border-color: rgba(242,139,130,0.25); color: var(--danger); }

    .queue-info {
      background: rgba(124,158,245,0.08); border: 1px solid rgba(124,158,245,0.15);
      border-radius: 12px; padding: 14px; font-size: 13px; color: var(--accent);
      margin-top: 10px; line-height: 1.6;
    }

    /* Toast */
    .toast {
      position: fixed; bottom: calc(var(--safe-bottom) + 90px); left: 50%; transform: translateX(-50%) translateY(20px);
      background: #2a2a3e; border: 1px solid var(--border);
      border-radius: 10px; padding: 12px 20px;
      font-size: 14px; font-weight: 500;
      opacity: 0; transition: all .3s; z-index: 999; white-space: nowrap;
      pointer-events: none;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    .toast.success { border-color: rgba(168,237,190,0.4); color: var(--accent2); }
    .toast.fail { border-color: rgba(242,139,130,0.4); color: var(--danger); }
  </style>
</head>
<body>

<nav>
  <h1>🌿 Darmtagebuch</h1>
  <button class="sync-btn" onclick="syncAll()" id="syncBtn">↑ Sync</button>
</nav>

<!-- PAGES -->
<div id="page-new" class="page active">
  <div class="card">
    <div class="card-title">Datum & Uhrzeit</div>
    <div class="datetime-row">
      <input type="date" id="entryDate" />
      <input type="time" id="entryTime" />
    </div>
  </div>

  <div class="card">
    <div class="card-title">Bristol-Skala</div>
    <div class="bristol-grid" id="bristolGrid">
      <!-- generated by JS -->
    </div>
  </div>

  <div class="card">
    <div class="card-title">Farbe</div>
    <div class="color-grid" id="colorGrid">
      <!-- generated by JS -->
    </div>
  </div>

  <div class="card">
    <div class="card-title">Schmerzen / Beschwerden <span style="color:var(--text-muted);font-size:12px">(0 = keine)</span></div>
    <div class="pain-row">
      <input type="range" id="painSlider" min="0" max="10" value="0" oninput="document.getElementById('painVal').textContent=this.value" />
      <span class="pain-val" id="painVal">0</span>
    </div>
  </div>

  <div class="card">
    <div class="card-title">Notizen</div>
    <textarea id="notesField" placeholder="Optionale Bemerkungen…" rows="3"></textarea>
  </div>

  <button class="submit-btn" onclick="saveEntry()">Eintrag speichern</button>
</div>

<div id="page-history" class="page">
  <div id="historyList"></div>
</div>

<div id="page-settings" class="page">
  <div class="settings-label">Google Apps Script URL</div>
  <input class="settings-input" type="url" id="scriptUrl" placeholder="https://script.google.com/macros/s/…/exec" />
  <div class="settings-hint">Deine Web-App-URL aus Google Apps Script (Schritt 3 der Anleitung)</div>

  <button class="settings-save" onclick="saveSettings()">Einstellungen speichern</button>

  <div id="settingsStatus"></div>

  <div class="queue-info" id="queueInfo"></div>
</div>

<!-- TABS -->
<nav class="tabs" style="position:fixed">
  <button class="tab-btn active" onclick="showTab('new',this)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
    Neu
  </button>
  <button class="tab-btn" onclick="showTab('history',this)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 8v4l3 3"/><circle cx="12" cy="12" r="9"/></svg>
    Verlauf
  </button>
  <button class="tab-btn" onclick="showTab('settings',this)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
    Einstellungen
  </button>
</nav>

<div class="toast" id="toast"></div>

<script>
// ── DATA ──
const BRISTOL = [
  { num:1, shape:'🟤', label:'Einzeln hart' },
  { num:2, shape:'🟫', label:'Klumpig' },
  { num:3, shape:'🌰', label:'Rissig' },
  { num:4, shape:'🐛', label:'Glatt' },
  { num:5, shape:'🫘', label:'Weich' },
  { num:6, shape:'💧', label:'Breiig' },
  { num:7, shape:'🌊', label:'Flüssig' },
];
const COLORS = [
  { id:'braun',    hex:'#7B4D2A', label:'Braun' },
  { id:'hellbraun',hex:'#C8843A', label:'Hell' },
  { id:'dunkel',   hex:'#3D1F0A', label:'Dunkel' },
  { id:'gelb',     hex:'#D4B44A', label:'Gelb' },
  { id:'gruen',    hex:'#5A8A3C', label:'Grün' },
  { id:'rot',      hex:'#B83232', label:'Rot' },
  { id:'schwarz',  hex:'#1a1a1a', label:'Schwarz' },
];

let selectedBristol = null;
let selectedColor = null;

// ── INIT ──
function init() {
  // Set defaults
  const now = new Date();
  document.getElementById('entryDate').value = now.toISOString().slice(0,10);
  document.getElementById('entryTime').value = now.toTimeString().slice(0,5);

  // Build Bristol
  const grid = document.getElementById('bristolGrid');
  BRISTOL.forEach(b => {
    const btn = document.createElement('button');
    btn.className = 'bristol-btn';
    btn.dataset.val = b.num;
    btn.innerHTML = `<span class="num">${b.num}</span><span class="shape">${b.shape}</span><span class="label">${b.label}</span>`;
    btn.onclick = () => {
      document.querySelectorAll('.bristol-btn').forEach(x => x.classList.remove('selected'));
      btn.classList.add('selected');
      selectedBristol = b.num;
    };
    grid.appendChild(btn);
  });

  // Build Colors
  const cg = document.getElementById('colorGrid');
  COLORS.forEach(c => {
    const wrap = document.createElement('div');
    wrap.className = 'color-wrap';
    const chip = document.createElement('div');
    chip.className = 'color-chip';
    chip.style.background = c.hex;
    chip.dataset.id = c.id;
    chip.dataset.label = c.label;
    chip.title = c.label;
    chip.onclick = () => {
      document.querySelectorAll('.color-chip').forEach(x => x.classList.remove('selected'));
      chip.classList.add('selected');
      selectedColor = c.id;
    };
    wrap.appendChild(chip);
    cg.appendChild(wrap);
  });

  // Load settings
  document.getElementById('scriptUrl').value = localStorage.getItem('scriptUrl') || '';
  updateQueueInfo();
  renderHistory();
}

// ── SAVE ENTRY ──
function saveEntry() {
  const date = document.getElementById('entryDate').value;
  const time = document.getElementById('entryTime').value;
  if (!date || !time) { toast('Bitte Datum und Uhrzeit eingeben', 'fail'); return; }

  const entry = {
    id: Date.now(),
    datetime: `${date}T${time}`,
    bristol: selectedBristol,
    farbe: selectedColor,
    schmerzen: parseInt(document.getElementById('painSlider').value),
    notizen: document.getElementById('notesField').value.trim(),
    synced: false
  };

  const entries = getEntries();
  entries.unshift(entry);
  localStorage.setItem('entries', JSON.stringify(entries));

  toast('Eintrag gespeichert ✓', 'success');
  resetForm();
  updateQueueInfo();
  syncAll();
}

function resetForm() {
  const now = new Date();
  document.getElementById('entryDate').value = now.toISOString().slice(0,10);
  document.getElementById('entryTime').value = now.toTimeString().slice(0,5);
  document.querySelectorAll('.bristol-btn').forEach(x => x.classList.remove('selected'));
  document.querySelectorAll('.color-chip').forEach(x => x.classList.remove('selected'));
  document.getElementById('painSlider').value = 0;
  document.getElementById('painVal').textContent = '0';
  document.getElementById('notesField').value = '';
  selectedBristol = null; selectedColor = null;
}

// ── STORAGE ──
function getEntries() {
  return JSON.parse(localStorage.getItem('entries') || '[]');
}

// ── HISTORY ──
function renderHistory() {
  const list = document.getElementById('historyList');
  const entries = getEntries();
  if (!entries.length) {
    list.innerHTML = `<div class="empty-state"><div class="icon">📋</div>Noch keine Einträge.<br>Füge deinen ersten Eintrag hinzu!</div>`;
    return;
  }
  list.innerHTML = entries.map(e => {
    const colorData = COLORS.find(c => c.id === e.farbe);
    const dotColor = colorData ? colorData.hex : '#555';
    const dt = new Date(e.datetime);
    const dateStr = dt.toLocaleDateString('de-DE', { weekday:'short', day:'2-digit', month:'2-digit', year:'numeric' });
    const timeStr = dt.toLocaleTimeString('de-DE', { hour:'2-digit', minute:'2-digit' });
    const bristolInfo = e.bristol ? BRISTOL.find(b => b.num === e.bristol) : null;
    const tags = [];
    if (bristolInfo) tags.push(`Typ ${bristolInfo.num} ${bristolInfo.shape}`);
    if (e.farbe) tags.push(colorData?.label || e.farbe);
    if (e.schmerzen > 0) tags.push(`Schmerz ${e.schmerzen}/10`);
    const syncIcon = e.synced ? '☁️' : '⏳';
    return `<div class="history-entry">
      <div class="entry-dot" style="background:${dotColor}"></div>
      <div class="entry-body">
        <div class="entry-date">${dateStr} · ${timeStr} ${syncIcon}</div>
        <div class="entry-main">${bristolInfo ? `Bristol ${bristolInfo.num} – ${bristolInfo.label}` : 'Kein Typ angegeben'}</div>
        ${e.notizen ? `<div style="font-size:13px;color:var(--text-muted);margin-top:4px">${e.notizen}</div>` : ''}
        <div class="entry-tags">${tags.map(t=>`<span class="tag">${t}</span>`).join('')}</div>
      </div>
      <button class="entry-delete" onclick="deleteEntry(${e.id})">×</button>
    </div>`;
  }).join('');
}

function deleteEntry(id) {
  const entries = getEntries().filter(e => e.id !== id);
  localStorage.setItem('entries', JSON.stringify(entries));
  renderHistory();
  updateQueueInfo();
}

// ── SYNC ──
async function syncAll() {
  const url = localStorage.getItem('scriptUrl');
  if (!url) return;

  const entries = getEntries();
  const unsynced = entries.filter(e => !e.synced);
  if (!unsynced.length) return;

  const btn = document.getElementById('syncBtn');
  btn.textContent = '↻ Sync…';

  let successCount = 0;
  for (const entry of unsynced) {
    try {
      const colorData = COLORS.find(c => c.id === entry.farbe);
      const bristolInfo = entry.bristol ? BRISTOL.find(b => b.num === entry.bristol) : null;
      const payload = {
        datum: entry.datetime.slice(0,10),
        uhrzeit: entry.datetime.slice(11,16),
        bristol_typ: entry.bristol || '',
        bristol_bezeichnung: bristolInfo?.label || '',
        farbe: colorData?.label || '',
        schmerzen: entry.schmerzen,
        notizen: entry.notizen
      };
      const res = await fetch(url, {
        method: 'POST',
        body: JSON.stringify(payload)
      });
      if (res.ok) {
        entry.synced = true;
        successCount++;
      }
    } catch(e) { /* offline */ }
  }

  localStorage.setItem('entries', JSON.stringify(entries));
  btn.textContent = '↑ Sync';
  updateQueueInfo();
  if (successCount > 0) {
    toast(`${successCount} Eintrag/Einträge synchronisiert ☁️`, 'success');
    renderHistory();
  }
}

function updateQueueInfo() {
  const entries = getEntries();
  const pending = entries.filter(e => !e.synced).length;
  const synced = entries.filter(e => e.synced).length;
  document.getElementById('queueInfo').innerHTML = pending > 0
    ? `⏳ ${pending} Eintrag/Einträge warten auf Sync · ☁️ ${synced} bereits synchronisiert`
    : synced > 0 ? `☁️ Alle ${synced} Einträge synchronisiert` : '';
}

// ── SETTINGS ──
function saveSettings() {
  localStorage.setItem('scriptUrl', document.getElementById('scriptUrl').value.trim());
  const st = document.getElementById('settingsStatus');
  st.innerHTML = `<div class="status-badge">✓ Einstellungen gespeichert</div>`;
  setTimeout(() => st.innerHTML = '', 3000);
  updateQueueInfo();
}

// ── TABS ──
function showTab(name, btn) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('page-' + name).classList.add('active');
  btn.classList.add('active');
  if (name === 'history') renderHistory();
  if (name === 'settings') updateQueueInfo();
}

// ── TOAST ──
function toast(msg, type='success') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = `toast ${type} show`;
  setTimeout(() => t.className = 'toast', 2800);
}

// ── SERVICE WORKER ──
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(() => {});
}

init();
</script>
</body>
</html>
